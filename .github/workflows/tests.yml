name: RTL Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: install iverilog
        run: sudo apt-get update && sudo apt-get install -y iverilog && mkdir -p sim

      - name: alu
        run: |
          iverilog -g2012 -o sim/tb_alu.vvp rtl/rv32i_pkg.sv rtl/alu.sv sim/tb_alu.sv
          vvp sim/tb_alu.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'

      - name: register_file
        run: |
          iverilog -g2012 -o sim/tb_register_file.vvp rtl/rv32i_pkg.sv rtl/register_file.sv sim/tb_register_file.sv
          vvp sim/tb_register_file.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'

      - name: immediate_generator
        run: |
          iverilog -g2012 -o sim/tb_immediate_generator.vvp rtl/rv32i_pkg.sv rtl/immediate_generator.sv sim/tb_immediate_generator.sv
          vvp sim/tb_immediate_generator.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'

      - name: branch_unit
        run: |
          iverilog -g2012 -o sim/tb_branch_unit.vvp rtl/rv32i_pkg.sv rtl/branch_unit.sv sim/tb_branch_unit.sv
          vvp sim/tb_branch_unit.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'

      - name: decoder
        run: |
          iverilog -g2012 -o sim/tb_decoder.vvp rtl/rv32i_pkg.sv rtl/decoder.sv sim/tb_decoder.sv
          vvp sim/tb_decoder.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'

      - name: instruction_memory
        run: |
          iverilog -g2012 -o sim/tb_instruction_memory.vvp rtl/instruction_memory.sv sim/tb_instruction_memory.sv
          vvp sim/tb_instruction_memory.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'

      - name: data_memory
        run: |
          iverilog -g2012 -o sim/tb_data_memory.vvp rtl/data_memory.sv sim/tb_data_memory.sv
          vvp sim/tb_data_memory.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'

      - name: forward_unit
        run: |
          iverilog -g2012 -o sim/tb_forward_unit.vvp rtl/rv32i_pkg.sv rtl/forward_unit.sv sim/tb_forward_unit.sv
          vvp sim/tb_forward_unit.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'

      - name: hazard_unit
        run: |
          iverilog -g2012 -o sim/tb_hazard_unit.vvp rtl/rv32i_pkg.sv rtl/hazard_unit.sv sim/tb_hazard_unit.sv
          vvp sim/tb_hazard_unit.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'

      - name: rv32i_cpu
        run: |
          iverilog -g2012 -o sim/tb_rv32i_cpu.vvp rtl/rv32i_pkg.sv sim/tb_rv32i_cpu.sv rtl/a*.sv rtl/b*.sv rtl/d*.sv rtl/f*.sv rtl/h*.sv rtl/i*.sv rtl/register_file.sv rtl/rv32i_cpu.sv
          vvp sim/tb_rv32i_cpu.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'

      - name: axi_lite_interconnect
        run: |
          iverilog -g2012 -o sim/tb_axi_lite_interconnect.vvp rtl/axi4_lite_pkg.sv rtl/axi_lite_dmem_slave.sv rtl/axi_lite_gpio_slave.sv rtl/axi_lite_uart_slave.sv rtl/axi_lite_timer_slave.sv rtl/axi_lite_err_slave.sv rtl/axi_lite_interconnect.sv sim/tb_axi_lite_interconnect.sv
          vvp sim/tb_axi_lite_interconnect.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'
          
      - name: rv32i_soc
        run: |
          iverilog -g2012 -o sim/tb_rv32i_soc.vvp rtl/rv32i_pkg.sv rtl/a*.sv rtl/b*.sv rtl/d*.sv rtl/f*.sv rtl/h*.sv rtl/i*.sv rtl/register_file.sv rtl/rv32i_cpu.sv rtl/rv32i_soc.sv sim/tb_rv32i_soc.sv
          vvp sim/tb_rv32i_soc.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'

      - name: rv32i_soc_c
        run: |
          iverilog -g2012 -o sim/tb_rv32i_soc_c.vvp rtl/rv32i_pkg.sv rtl/a*.sv rtl/b*.sv rtl/d*.sv rtl/f*.sv rtl/h*.sv rtl/i*.sv rtl/register_file.sv rtl/rv32i_cpu.sv rtl/rv32i_soc.sv sim/tb_rv32i_soc_c.sv
          vvp sim/tb_rv32i_soc_c.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'

      - name: rv32i_soc_integration
        run: |
          iverilog -g2012 -o sim/tb_rv32i_soc_integration.vvp rtl/rv32i_pkg.sv rtl/a*.sv rtl/b*.sv rtl/d*.sv rtl/f*.sv rtl/h*.sv rtl/i*.sv rtl/register_file.sv rtl/rv32i_cpu.sv rtl/rv32i_soc.sv sim/tb_rv32i_soc_integration.sv
          vvp sim/tb_rv32i_soc_integration.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'

      - name: rv32i_cpu_c
        run: |
          iverilog -g2012 -o sim/tb_rv32i_cpu_c.vvp rtl/rv32i_pkg.sv sim/tb_rv32i_cpu_c.sv rtl/a*.sv rtl/b*.sv rtl/d*.sv rtl/f*.sv rtl/h*.sv rtl/i*.sv rtl/register_file.sv rtl/rv32i_cpu.sv
          vvp sim/tb_rv32i_cpu_c.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'

      - name: load_use_hazard
        run: |
          iverilog -g2012 -o sim/tb_load_use_hazard.vvp rtl/rv32i_pkg.sv sim/tb_load_use_hazard.sv rtl/a*.sv rtl/b*.sv rtl/d*.sv rtl/f*.sv rtl/h*.sv rtl/i*.sv rtl/register_file.sv rtl/rv32i_cpu.sv
          vvp sim/tb_load_use_hazard.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'

      - name: branch_benchmark
        run: |
          iverilog -g2012 -o sim/tb_branch_benchmark.vvp rtl/rv32i_pkg.sv sim/tb_branch_benchmark.sv rtl/a*.sv rtl/b*.sv rtl/d*.sv rtl/f*.sv rtl/h*.sv rtl/i*.sv rtl/register_file.sv rtl/rv32i_cpu.sv
          vvp sim/tb_branch_benchmark.vvp | tee test_output.log
          ! grep -v 'FAILED: 0' test_output.log | grep -q 'FAIL\|ERROR'
