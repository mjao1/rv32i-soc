name: Yosys Synthesis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  synth:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: install yosys
        run: sudo apt-get update && sudo apt-get install -y yosys

      - name: synthesize rv32i_cpu
        run: |
          yosys synth_cpu.ys
          test -f synth_rv32i_top.v

      - name: synthesize rv32i_soc
        run: |
          yosys synth_soc.ys
          test -f synth_rv32i_soc.v
